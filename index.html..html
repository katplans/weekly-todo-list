<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Makes the app scale correctly on iPhones and other mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Weekly To-Do List</title>

  <style>
    /* ------------------------------
       BASIC PAGE STYLING
       ------------------------------ */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f3ee;
      color: #2f2f2f;
    }

    .app {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
    }

    .subtitle {
      margin: 0;
      color: #6f6a63;
      font-size: 0.95rem;
    }

    /* ------------------------------
       WEEKLY LAYOUT
       ------------------------------ */

    .week-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .day-card {
      background: #ffffff;
      border: 1px solid #e7e0d8;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 5px 16px rgba(64, 55, 45, 0.06);
    }

    .day-title {
      margin: 0 0 14px;
      font-size: 1.15rem;
    }

    /* ------------------------------
       ADD TASK FORM
       ------------------------------ */

    .task-form {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .task-input {
      flex: 1;
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid #d9d2ca;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .task-input:focus {
      border-color: #8a7f73;
      box-shadow: 0 0 0 3px rgba(138, 127, 115, 0.12);
    }

    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .add-button {
      padding: 10px 14px;
      background: #3f5d4e;
      color: white;
      font-weight: bold;
    }

    .add-button:hover {
      background: #334b40;
    }

    /* ------------------------------
       TASK LIST ITEMS
       ------------------------------ */

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 9px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px;
      background: #faf8f5;
      border: 1px solid #ece6df;
      border-radius: 10px;
    }

    .task-checkbox {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      accent-color: #3f5d4e;
    }

    .task-text {
      flex: 1;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .task-item.completed .task-text {
      color: #8f8a84;
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .small-button {
      padding: 7px 9px;
      background: #ebe6df;
      color: #3a3733;
    }

    .small-button:hover {
      background: #ded7cf;
    }

    .delete-button {
      background: #f5dddd;
      color: #8c3535;
    }

    .delete-button:hover {
      background: #edcccc;
    }

    .empty-message {
      color: #99928b;
      font-size: 0.9rem;
      font-style: italic;
      padding: 4px 2px;
    }

    /* ------------------------------
       RESPONSIVE DESIGN
       ------------------------------ */

    /* Three columns on wider screens */
    @media (min-width: 850px) {
      .week-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .day-card:last-child {
        grid-column: 2;
      }
    }

    /* One card per row on smaller phones */
    @media (max-width: 620px) {
      .app {
        padding: 18px 12px 30px;
      }

      .week-grid {
        grid-template-columns: 1fr;
      }

      .day-card {
        padding: 14px;
      }

      .task-form {
        align-items: stretch;
      }

      .add-button {
        padding-inline: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <h1>My Weekly To-Do List</h1>
      <p class="subtitle">Simple plans for Monday through Sunday</p>
    </header>

    <!-- JavaScript will automatically add all seven day sections here -->
    <section id="weekGrid" class="week-grid"></section>
  </main>

  <script>
    /* ------------------------------
       APP DATA
       ------------------------------ */

    // The seven days we want to show in the app.
    const days = [
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday",
      "Sunday"
    ];

    // This is the name used to save the tasks inside the browser.
    const STORAGE_KEY = "simpleWeeklyTodoTasks";

    // Try to load saved tasks from localStorage.
    // If there are no saved tasks yet, start with an empty object.
    let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    // Make sure every day has its own task array.
    days.forEach((day) => {
      if (!Array.isArray(tasks[day])) {
        tasks[day] = [];
      }
    });

    /* ------------------------------
       SAVE TASKS
       ------------------------------ */

    // Saves the current task data in the browser.
    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    /* ------------------------------
       CREATE THE WEEKLY LAYOUT
       ------------------------------ */

    const weekGrid = document.getElementById("weekGrid");

    days.forEach((day) => {
      // Create one card for each day.
      const card = document.createElement("section");
      card.className = "day-card";

      // Add the day title, input box, button, and task list.
      card.innerHTML = `
        <h2 class="day-title">${day}</h2>

        <form class="task-form" data-day="${day}">
          <input
            class="task-input"
            type="text"
            placeholder="Add a task..."
            aria-label="Add a task for ${day}"
            maxlength="120"
          />
          <button class="add-button" type="submit">Add</button>
        </form>

        <ul class="task-list" id="list-${day}"></ul>
      `;

      weekGrid.appendChild(card);
    });

    /* ------------------------------
       ADD A NEW TASK
       ------------------------------ */

    document.querySelectorAll(".task-form").forEach((form) => {
      form.addEventListener("submit", (event) => {
        // Stop the page from refreshing when the form is submitted.
        event.preventDefault();

        const day = form.dataset.day;
        const input = form.querySelector(".task-input");
        const taskText = input.value.trim();

        // Do not add blank tasks.
        if (!taskText) return;

        // Create a task object.
        tasks[day].push({
          id: Date.now(),
          text: taskText,
          completed: false
        });

        saveTasks();
        renderDay(day);

        // Clear the input and place the cursor back inside it.
        input.value = "";
        input.focus();
      });
    });

    /* ------------------------------
       DISPLAY TASKS FOR ONE DAY
       ------------------------------ */

    function renderDay(day) {
      const list = document.getElementById(`list-${day}`);
      list.innerHTML = "";

      // Show a message when a day has no tasks.
      if (tasks[day].length === 0) {
        const emptyMessage = document.createElement("li");
        emptyMessage.className = "empty-message";
        emptyMessage.textContent = "No tasks yet.";
        list.appendChild(emptyMessage);
        return;
      }

      tasks[day].forEach((task) => {
        const item = document.createElement("li");
        item.className = "task-item";

        if (task.completed) {
          item.classList.add("completed");
        }

        // Checkbox
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "task-checkbox";
        checkbox.checked = task.completed;
        checkbox.setAttribute("aria-label", `Mark ${task.text} complete`);

        checkbox.addEventListener("change", () => {
          task.completed = checkbox.checked;
          saveTasks();
          renderDay(day);
        });

        // Task text
        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;

        // Button area
        const actions = document.createElement("div");
        actions.className = "task-actions";

        // Edit button
        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "small-button";
        editButton.textContent = "Edit";

        editButton.addEventListener("click", () => {
          const updatedText = prompt("Edit your task:", task.text);

          // Cancel keeps the original task.
          if (updatedText === null) return;

          const cleanedText = updatedText.trim();

          // Do not allow an empty edited task.
          if (!cleanedText) return;

          task.text = cleanedText;
          saveTasks();
          renderDay(day);
        });

        // Delete button
        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "small-button delete-button";
        deleteButton.textContent = "Delete";

        deleteButton.addEventListener("click", () => {
          const shouldDelete = confirm(`Delete "${task.text}"?`);

          if (!shouldDelete) return;

          tasks[day] = tasks[day].filter(
            (savedTask) => savedTask.id !== task.id
          );

          saveTasks();
          renderDay(day);
        });

        actions.append(editButton, deleteButton);
        item.append(checkbox, text, actions);
        list.appendChild(item);
      });
    }

    /* ------------------------------
       FIRST PAGE LOAD
       ------------------------------ */

    // Show all saved tasks when the page first opens.
    days.forEach((day) => renderDay(day));
  </script>
</body>
</html>
